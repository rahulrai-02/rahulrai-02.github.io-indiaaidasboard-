<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Candidate Profile - Admin</title>

<!-- SECURITY CHECK -->
<script>
  if (sessionStorage.getItem('isAdminLoggedIn') !== 'true') {
    window.location.replace('login.html');
  }
</script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="g-flat.css">
<script src="lang-support.js" defer></script>
<style>
  :root {
    --bg-body: #f8f9fa; --bg-surface: #ffffff; --text-main: #1e293b; --text-muted: #64748b;
    --border: #e2e8f0; --primary: #FF9933; --primary-hover: #e68a2e; --navy: #000080;
    --success: #138808; --warning: #F59E0B; --danger: #dc2626;
    --radius-md: 8px; --radius-lg: 12px;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Outfit', 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); }
  
  header { background: var(--bg-surface); padding: 16px 32px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .brand { display: flex; align-items: center; gap: 12px; font-weight: 700; color: var(--navy); font-size: 1.25rem;}
  .btn { padding: 8px 16px; border-radius: var(--radius-md); font-weight: 600; cursor: pointer; border: 1px solid var(--border); background: var(--bg-surface); transition: all 0.2s; }
  .btn-primary { background: var(--primary); color: white; border: none; }
  .btn-primary:hover:not(:disabled) { background: var(--primary-hover); }
  
  main { max-width: 900px; margin: 40px auto; padding: 0 20px; }
  .card { background: var(--bg-surface); padding: 32px; border-radius: var(--radius-lg); border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); }
  
  .header-banner { border-bottom: 2px solid var(--border); padding-bottom: 16px; margin-bottom: 24px; }
  .header-banner h2 { color: var(--navy); }
  .header-banner p { color: var(--text-muted); font-size: 0.875rem; margin-top: 4px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: span 2; }
  
  label { font-size: 0.875rem; font-weight: 600; color: var(--text-main); }
  input, select { padding: 10px 14px; border: 1px solid var(--border); border-radius: var(--radius-md); font-family: 'Outfit', 'Inter', sans-serif; font-size: 0.875rem; }
  input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255,153,51,0.15); }
  
  .section-title { font-size: 1.125rem; font-weight: 700; margin: 24px 0 16px; grid-column: span 2; border-bottom: 1px solid var(--border); padding-bottom: 8px; color: var(--navy); }
  
  .actions { display: flex; justify-content: flex-end; gap: 12px; margin-top: 30px; padding-top: 20px; border-top: 1px solid var(--border); }
  
  #msg-box { display: none; padding: 12px; border-radius: var(--radius-md); margin-bottom: 20px; font-weight: 600; text-align: center; }
  .msg-success { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
  .msg-error { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }

  @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } .form-group.full, .section-title { grid-column: span 1; } }
</style>
</head>
<body>

<header>
  <div class="brand"><i class="fas fa-user-edit" style="color:var(--primary)"></i> Admin Profile Editor</div>
  <button class="btn" onclick="window.close()">Close Tab</button>
</header>

<main>
  <div class="card">
    <div class="header-banner" style="display: flex; gap: 20px; align-items: center; justify-content: flex-start;">
      <div style="flex-shrink: 0;">
        <img id="admin_candidate_profile_photo" src="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&q=80&w=200" alt="Profile" style="width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid white; box-shadow: 0 2px 8px rgba(0,0,0,0.2);">
      </div>
      <div>
        <h2 id="display_name">Loading...</h2>
        <p>Registration No: <strong id="display_reg">---</strong></p>
        <div id="certificate-button-container" style="display:none; margin-top: 10px;">
          <button type="button" class="btn btn-primary" onclick="openCertificate()"><i class="fas fa-award"></i> View Certificate</button>
        </div>
      </div>
    </div>

    <div id="certificate-modal" style="display:none; position:fixed; inset:0; background:rgba(15,23,42,0.75); align-items:center; justify-content:center; z-index:9999; padding:20px;">
      <div style="width:100%; max-width:960px; height:90%; background:#fff; border-radius:16px; overflow:hidden; display:flex; flex-direction:column;">
        <div style="display:flex; justify-content:space-between; align-items:center; padding:16px; border-bottom:1px solid #e5e7eb; background:#f8fafc;">
          <div style="font-size:1rem; font-weight:700; color:#111827;">Certificate Preview</div>
          <button type="button" class="btn" style="background:#ef4444; color:#fff;" onclick="closeCertificateModal()">Close</button>
        </div>
        <iframe id="certificate-frame" src="" style="flex:1; width:100%; border:none; background:#f8fafc;"></iframe>
      </div>
    </div>

    <div id="msg-box"></div>

    <form id="admin-edit-form">
      <div class="form-grid">
        
        <div class="section-title">Academic & Enrollment Data</div>
        <div class="form-group">
          <label>Course Name</label>
          <input type="text" id="Courses">
        </div>
        <div class="form-group">
          <label>Batch Wise</label>
          <input type="text" id="Batch Wise">
        </div>
        <div class="form-group">
          <label>Registration Number</label>
          <input type="text" id="Candidate_registration_no">
        </div>
        <div class="form-group">
          <label>Result Status</label>
          <select id="Result">
            <option value="Pass">Pass</option>
            <option value="Fail">Fail</option>
            <option value="Pending">Pending</option>
            <option value="Absent">Absent</option>
            <option value="Dropout">Dropout</option>
            <option value="">(Blank)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Certificates Issued?</label>
          <input type="text" id="Certificates">
        </div>
        <div class="form-group">
          <label>Start Date</label>
          <input type="text" id="Start Date" placeholder="DD-MM-YYYY">
        </div>
        <div class="form-group">
          <label>End Date</label>
          <input type="text" id="End Date" placeholder="DD-MM-YYYY">
        </div>

        <div class="section-title">Personal Information</div>
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="Candidate_Name" required>
        </div>
        <div class="form-group">
          <label>Date of Birth</label>
          <input type="text" id="Candidate_Birth_date" placeholder="DD-MM-YYYY">
        </div>
        <div class="form-group">
          <label>Gender</label>
          <input type="text" id="Candidate_Gender">
        </div>
        <div class="form-group">
          <label>Category</label>
          <input type="text" id="Category">
        </div>
        <div class="form-group">
          <label>Father's Name</label>
          <input type="text" id="Father_Name">
        </div>
        <div class="form-group">
          <label>Mother's Name</label>
          <input type="text" id="Mother_Name">
        </div>

        <div class="section-title">Contact & Identity</div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="Candidate_Email">
        </div>
        <div class="form-group">
          <label>Mobile Number</label>
          <input type="text" id="Candidate_Mobile">
        </div>
        <div class="form-group">
          <label>Aadhaar Number</label>
          <input type="text" id="Aadhaar">
        </div>
        <div class="form-group">
          <label>Apaar / ABC ID</label>
          <input type="text" id="Apaar">
        </div>
        <div class="form-group full">
          <label>Permanent Address (City, State)</label>
          <input type="text" id="Candidate_Perm_Address_City_State">
        </div>

        <!-- Hidden identifiers -->
        <input type="hidden" id="SNo.">
      </div>

      <div class="actions">
        <button type="button" class="btn" onclick="window.close()">Cancel</button>
        <button type="submit" class="btn btn-primary" id="save-btn"><i class="fas fa-save"></i> Save Changes to Master Database</button>
      </div>
    </form>
  </div>
</main>

<script>
  // YOUR APPS SCRIPT URL HERE
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyAfhakyTh0j_StQ3a2MpnZlqQq-46kuW45Vw8V2V8gIUa9Prr-c21K-d5ZoTYAEnU2VQ/exec';

  const fields = [
    'SNo.', 'Candidate_registration_no', 'Candidate_Name', 'Courses', 'Candidate_Gender', 
    'Father_Name', 'Mother_Name', 'Candidate_Birth_date', 'Candidate_Email', 
    'Candidate_Mobile', 'Candidate_Perm_Address_City_State', 'Result', 
    'Start Date', 'End Date', 'Batch Wise', 'Category', 'Certificates', 'Apaar', 'Aadhaar'
  ];

  let currentCertificateUrl = '';

  document.addEventListener('DOMContentLoaded', () => {
    const rawData = localStorage.getItem('currentCandidateProfile');
    if (!rawData) {
      document.getElementById('display_name').innerText = "Error: No candidate data found.";
      return;
    }

    const candidate = JSON.parse(rawData);
    
    document.getElementById('display_name').innerText = candidate['Candidate_Name'] || 'Candidate Profile';
    document.getElementById('display_reg').innerText = candidate['Candidate_registration_no'] || 'N/A';
    const certLink = String(candidate['Certificate Link'] || '').trim();
    if (certLink) {
      currentCertificateUrl = certLink;
      document.getElementById('certificate-button-container').style.display = 'block';
    }

    const photoLink = String(candidate['Photo Link'] || candidate['Profile_Photo'] || candidate['Photo'] || '').trim();
    if (photoLink && photoLink.startsWith('http')) {
      let finalUrl = photoLink;
      const driveMatch = photoLink.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if (driveMatch && driveMatch[1]) {
        finalUrl = `https://drive.google.com/thumbnail?id=${driveMatch[1]}&sz=w800`;
      }
      document.getElementById('admin_candidate_profile_photo').src = finalUrl;
    }

    // Populate all fields
    fields.forEach(field => {
      const el = document.getElementById(field);
      if (el && candidate[field] !== undefined) {
        // Handle dropdowns properly
        if (el.tagName === 'SELECT') {
          const valToSelect = Object.values(el.options).find(opt => opt.value.toLowerCase() === String(candidate[field]).toLowerCase());
          if (valToSelect) el.value = valToSelect.value;
          else {
            const newOption = new Option(candidate[field], candidate[field], true, true);
            el.add(newOption);
          }
        } else {
          el.value = candidate[field];
        }
      }
    });
  });

  function getCertificatePreviewUrl(url) {
    if (!url) return '';
    if (url.includes('drive.google.com/file/d/')) {
      const match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
      if (match && match[1]) {
        return `https://drive.google.com/file/d/${match[1]}/preview`;
      }
    }
    if (url.includes('/view')) return url.replace('/view', '/preview');
    if (url.includes('/preview')) return url;
    return url;
  }

  function openCertificate() {
    if (!currentCertificateUrl) {
      alert('Certificate link is not available for this candidate.');
      return;
    }
    const previewUrl = getCertificatePreviewUrl(currentCertificateUrl);
    document.getElementById('certificate-frame').src = previewUrl;
    document.getElementById('certificate-modal').style.display = 'flex';
  }

  function closeCertificateModal() {
    document.getElementById('certificate-frame').src = '';
    document.getElementById('certificate-modal').style.display = 'none';
  }

  document.getElementById('admin-edit-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const btn = document.getElementById('save-btn');
    const msgBox = document.getElementById('msg-box');
    
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
    btn.disabled = true;
    msgBox.style.display = 'none';

    let payload = { 
      action: 'admin_update',
      adminToken: sessionStorage.getItem('adminToken')
    };
    
    // Grab everything from the original data, then overwrite with form inputs
    const currentData = JSON.parse(localStorage.getItem('currentCandidateProfile'));
    Object.assign(payload, currentData);

    fields.forEach(field => {
      const el = document.getElementById(field);
      if (el) payload[field] = el.value;
    });

    try {
      const response = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });

      const result = await response.json();

      if (result.status === 'success') {
        msgBox.className = 'msg-success';
        msgBox.innerHTML = '<i class="fas fa-check-circle"></i> Profile successfully updated in the master database.';
        msgBox.style.display = 'block';
        
        // Update local storage so if they refresh, the new data is there
        localStorage.setItem('currentCandidateProfile', JSON.stringify(payload));
        document.getElementById('display_name').innerText = payload['Candidate_Name'];
      } else {
        throw new Error(result.message);
      }
    } catch (error) {
      msgBox.className = 'msg-error';
      msgBox.innerHTML = '<i class="fas fa-exclamation-triangle"></i> ' + (error.message || "Failed to save profile.");
      msgBox.style.display = 'block';
    } finally {
      btn.innerHTML = '<i class="fas fa-save"></i> Save Changes to Master Database';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
