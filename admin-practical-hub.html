<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Practical Exams - NIELIT Ropar</title>
<script>
  if (sessionStorage.getItem('isAdminLoggedIn') !== 'true') {
    window.location.replace('login.html');
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="g-flat.css">
<script src="lang-support.js" defer></script>
<style>
  :root {
    --bg-body: #f8f9fa; --bg-surface: #ffffff; --text-main: #1e293b; --text-muted: #64748b;
    --border: #e2e8f0; --primary: #FF9933; --primary-hover: #e68a2e; --navy: #000080;
    --success: #138808; --warning: #F59E0B; --danger: #dc2626;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Outfit', 'Inter', sans-serif; background-color: var(--bg-body); color: var(--text-main); display: flex; height: 100vh; overflow: hidden; }

  /* SIDEBAR */
  .sidebar { width: 260px; background: var(--navy); color: white; display: flex; flex-direction: column; padding: 20px 0; flex-shrink: 0; }
  .brand { padding: 0 20px 30px; font-size: 1.25rem; font-weight: 700; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;}
  .brand i { color: #FF9933; }
  
  .nav-item { padding: 15px 20px; color: #cbd5e1; text-decoration: none; display: flex; align-items: center; gap: 12px; font-weight: 500; cursor: pointer; transition: all 0.2s; border-left: 4px solid transparent; }
  .nav-item:hover, .nav-item.active { background: rgba(255,255,255,0.05); color: white; border-left-color: var(--primary); }
  .logout-btn { margin-top: auto; color: #fca5a5; }
  .logout-btn:hover { color: #ef4444; background: rgba(239, 68, 68, 0.1); border-left-color: #ef4444; }

  /* MAIN CONTENT */
  .main-content { flex: 1; overflow-y: auto; padding: 40px; }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 1px solid var(--border); padding-bottom: 20px; }
  
  .card { background: var(--bg-surface); padding: 30px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05); margin-bottom: 24px; }
  
  table { width: 100%; border-collapse: collapse; margin-top: 20px; }
  th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
  th { background: #f8fafc; color: var(--navy); font-weight: 600; }
  tr:hover { background: #f8fafc; }
  
  .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: 600; }
  .badge-pending { background: #fef3c7; color: #b45309; }
  .badge-reviewed { background: #dcfce7; color: #166534; }
  
  .btn-evaluate { padding: 6px 12px; font-size: 0.85rem; border: 1px solid var(--border); background: white; border-radius: 6px; cursor: pointer; color: var(--navy); transition: 0.2s; }
  .btn-evaluate:hover { border-color: var(--primary); color: var(--primary); }
  
  .grading-form { display: none; margin-top: 10px; gap: 10px; align-items: center; }
  .grading-form select { padding: 6px; border-radius: 4px; border: 1px solid var(--border); }
  .btn-save { padding: 6px 12px; font-size: 0.85rem; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; }
</style>
</head>
<body>

  <div class="sidebar">
    <div class="brand"><i class="fas fa-shield-alt"></i> Admin Portal</div>
    <a class="nav-item" href="dashboard.html">
      <i class="fas fa-house"></i> Main Dashboard
    </a>
    <a class="nav-item" href="admin-dashboard.html">
      <i class="fas fa-award"></i> Certificates & Photos
    </a>
    <a class="nav-item" href="admin-assignment-hub.html">
      <i class="fas fa-laptop-code"></i> Assignment Hub
    </a>
    <a class="nav-item active" href="admin-practical-hub.html">
      <i class="fas fa-file-code"></i> Practical Exams
    </a>
    <a class="nav-item" href="attendance.html">
      <i class="fas fa-user-check"></i> Attendance Hub
    </a>
    <a class="nav-item logout-btn" onclick="logout()">
      <i class="fas fa-sign-out-alt"></i> Logout
    </a>
  </div>

  <div class="main-content">
    <div class="top-bar">
      <div>
        <h2 style="color:var(--navy);">Practical Exams Tracker</h2>
        <p style="color:var(--text-muted); font-size:0.9rem;">Monitor and review candidate practical exam submissions.</p>
      </div>
    </div>

    <div class="card">
      <h3 style="color: var(--navy); margin-bottom: 20px;"><i class="fas fa-list-alt"></i> Practical Submissions</h3>
      <div id="loader" style="color:var(--primary);"><i class="fas fa-spinner fa-spin"></i> Loading submissions...</div>
      <table id="practical-table" style="display: none;">
        <thead>
          <tr>
            <th>Student Name & Info</th>
            <th>Submitted File (.ipynb)</th>
            <th>Status / Evaluation</th>
          </tr>
        </thead>
        <tbody id="practical-body">
          <!-- Rows will be injected here -->
        </tbody>
      </table>
    </div>
  </div>

<script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyAfhakyTh0j_StQ3a2MpnZlqQq-46kuW45Vw8V2V8gIUa9Prr-c21K-d5ZoTYAEnU2VQ/exec';
  let practicalSubmissions = [];

  window.onload = async () => {
    await loadPracticals();
  };

  async function loadPracticals() {
    const loader = document.getElementById('loader');
    const table = document.getElementById('practical-table');
    const tbody = document.getElementById('practical-body');
    
    try {
      const resp = await fetch(APPS_SCRIPT_URL, { 
        method: 'POST', 
        body: JSON.stringify({ action: 'fetch_submissions', adminToken: sessionStorage.getItem('adminToken') }) 
      });
      const data = await resp.json();
      
      // Filter only practical exams
      practicalSubmissions = data.filter(s => s.Assignment_ID === 'PRACTICAL_EXAM');
      
      loader.style.display = 'none';
      table.style.display = 'table';
      
      if (practicalSubmissions.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:#64748b;">No practical submissions found.</td></tr>';
        return;
      }
      
      tbody.innerHTML = practicalSubmissions.map((sub, idx) => {
        const isPending = String(sub.Status).toLowerCase().includes('pending');
        const badgeClass = isPending ? 'badge-pending' : 'badge-reviewed';
        
        let fileLink = sub.Answer;
        if (fileLink && fileLink.startsWith('http')) {
          fileLink = `<a href="${fileLink}" target="_blank" style="color:var(--primary); text-decoration:underline;"><i class="fas fa-external-link-alt"></i> View .ipynb</a>`;
        } else {
          fileLink = `<span style="color:var(--danger)">Invalid format or no file</span>`;
        }

        return `
          <tr>
            <td>
              <strong>${sub.Candidate_Name || 'Unknown'}</strong>
              <div style="font-size:0.8rem; color:var(--text-muted); margin-top:4px;">Reg: ${sub.Candidate_registration_no} | Batch: ${sub['Batch Wise'] || sub.Batch}</div>
              <div style="font-size:0.75rem; color:#94a3b8; margin-top:2px;">Submitted: ${new Date(sub.Timestamp).toLocaleDateString()}</div>
            </td>
            <td>
              ${fileLink}
            </td>
            <td>
              <div id="status-display-${idx}" style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
                <span class="badge ${badgeClass}">${sub.Status}</span>
                <button class="btn-evaluate" onclick="toggleEvaluate(${idx})"><i class="fas fa-edit"></i></button>
              </div>
              <div id="evaluate-form-${idx}" class="grading-form">
                <select id="grade-select-${idx}">
                  <option value="Reviewed - Pass" ${sub.Status === 'Reviewed - Pass' ? 'selected' : ''}>Reviewed - Pass</option>
                  <option value="Reviewed - Needs Revision" ${sub.Status === 'Reviewed - Needs Revision' ? 'selected' : ''}>Reviewed - Needs Revision</option>
                  <option value="Pending Review" ${sub.Status === 'Pending Review' ? 'selected' : ''}>Pending Review</option>
                </select>
                <button class="btn-save" onclick="saveGrade(${idx}, ${sub.row_index})">Save</button>
                <button class="btn-evaluate" style="border:none;" onclick="toggleEvaluate(${idx})"><i class="fas fa-times"></i></button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
      
    } catch (err) {
      console.error(err);
      loader.innerHTML = '<span style="color:var(--danger);">Error loading practical submissions.</span>';
    }
  }

  window.toggleEvaluate = function(idx) {
    const display = document.getElementById(`status-display-${idx}`);
    const form = document.getElementById(`evaluate-form-${idx}`);
    if (form.style.display === 'flex') {
      form.style.display = 'none';
      display.style.display = 'flex';
    } else {
      form.style.display = 'flex';
      display.style.display = 'none';
    }
  };

  window.saveGrade = async function(idx, rowIndex) {
    const status = document.getElementById(`grade-select-${idx}`).value;
    const btn = document.querySelector(`#evaluate-form-${idx} .btn-save`);
    btn.disabled = true;
    btn.innerHTML = 'Saving...';
    
    try {
      const payload = { 
        action: 'grade_submission', 
        row_index: rowIndex, 
        Status: status,
        adminToken: sessionStorage.getItem('adminToken')
      };
      
      const resp = await fetch(APPS_SCRIPT_URL, { method:'POST', body: JSON.stringify(payload) });
      const res = await resp.json();
      
      if (res.status === 'success' || res.result === 'success') {
        await loadPracticals();
      } else {
        throw new Error('Save failed');
      }
    } catch (err) {
      alert('Error saving evaluation.');
      btn.disabled = false;
      btn.innerHTML = 'Save';
    }
  };
</script>
</body>
</html>
