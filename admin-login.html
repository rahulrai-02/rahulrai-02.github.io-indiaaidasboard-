<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  :root {
    --bg-body: #f1f5f9;
    --bg-surface: #ffffff;
    --text-main: #0f172a;
    --text-muted: #64748b;
    --border: #e2e8f0;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --danger: #dc2626;
    --radius-md: 8px;
    --radius-lg: 12px;
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: 'Inter', sans-serif; 
    background-color: var(--bg-body); 
    color: var(--text-main); 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    min-height: 100vh; 
  }
  
  .login-card {
    background: var(--bg-surface);
    padding: 40px;
    border-radius: var(--radius-lg);
    box-shadow: 0 10px 25px -5px rgb(0 0 0 / 0.1);
    border: 1px solid var(--border);
    width: 100%;
    max-width: 400px;
  }
  
  .login-header { text-align: center; margin-bottom: 30px; }
  .login-icon {
    width: 60px; height: 60px; background: #eff6ff; color: var(--primary);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem; margin: 0 auto 16px;
  }
  .login-header h1 { font-size: 1.5rem; font-weight: 700; color: var(--text-main); }
  .login-header p { color: var(--text-muted); font-size: 0.875rem; margin-top: 4px; }
  
  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 8px; }
  input {
    width: 100%; padding: 12px 14px; border: 1px solid var(--border);
    border-radius: var(--radius-md); font-family: 'Inter', sans-serif; font-size: 0.875rem;
    transition: border-color 0.2s;
  }
  input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
  
  .btn-primary {
    width: 100%; padding: 12px; background: var(--primary); color: white;
    border: none; border-radius: var(--radius-md); font-weight: 600; font-size: 0.875rem;
    cursor: pointer; transition: background 0.2s; margin-top: 10px;
  }
  .btn-primary:hover { background: var(--primary-hover); }
  
  #error-msg {
    color: var(--danger); font-size: 0.875rem; text-align: center;
    margin-top: 16px; font-weight: 500; display: none;
  }
</style>
</head>
<body>

  <header style="background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;">
    <a href="index.html" style="font-weight:700;font-size:1rem;color:#0f172a;text-decoration:none;">DataSync</a>
    <nav style="display:flex;gap:14px;align-items:center;">
      <a href="index.html" style="color:#64748b;text-decoration:none;">Home</a>
      <a href="about-us.html" style="color:#64748b;text-decoration:none;">About</a>
      <a href="training-curriculum.html" style="color:#64748b;text-decoration:none;">Training</a>
      <a href="contact-us.html" style="color:#64748b;text-decoration:none;">Contact</a>
      <a href="candidate-login.html" style="padding:6px 10px;background:#f8fafc;color:#0f172a;border-radius:8px;text-decoration:none;">Candidate</a>
      <a href="admin-login.html" style="padding:6px 10px;background:#2563eb;color:#fff;border-radius:8px;text-decoration:none;">Admin</a>
    </nav>
  </header>

  <div class="login-card">
  <div class="login-header">
    <div class="login-icon"><i class="fas fa-shield-alt"></i></div>
    <h1>Admin Access</h1>
    <p>Please log in to manage candidates</p>
  </div>
  
  <form id="login-form">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" placeholder="Enter admin username" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" required>
    </div>
    
    <button type="submit" class="btn-primary">Sign In</button>
    <div id="error-msg"><i class="fas fa-exclamation-circle"></i> Invalid username or password.</div>
  </form>
</div>

<script>
  // Set your desired admin credentials here
  const ADMIN_USER = "admin";
  const ADMIN_PASS = "admin123";

  document.getElementById('login-form').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const user = document.getElementById('username').value.trim();
    const pass = document.getElementById('password').value.trim();
    
    if (user === ADMIN_USER && pass === ADMIN_PASS) {
      // Set session token
      sessionStorage.setItem('isAdminLoggedIn', 'true');
      // Redirect to the dashboard
      window.location.href = 'dashboard.html';
    } else {
      document.getElementById('error-msg').style.display = 'block';
    }
  });
</script>
</body>
</html>
